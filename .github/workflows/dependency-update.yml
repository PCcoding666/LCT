name: Dependency Update Check

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-updates:
    name: Check for Dependency Updates
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Check for Outdated Packages
      run: |
        dotnet list package --outdated --include-transitive > outdated-packages.txt
        cat outdated-packages.txt
    
    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report-${{ github.run_number }}
        path: outdated-packages.txt
        retention-days: 30
    
    - name: Create Issue if Updates Available
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('outdated-packages.txt', 'utf8');
          
          if (report.includes('has updates')) {
            const title = 'Dependency Updates Available';
            const body = '## Outdated Packages Report\n\n```\n' + report + '\n```\n\nAutomated check on ' + new Date().toISOString();
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['dependencies', 'automated']
            });
          }
